volumes:
  notebooks:
    driver_opts:
      type: cifs
      o: "username=${USERNAME},password=${PASSWORD},uid=1000,gid=1000"
      device: "//${ADDRESS}/${NETPATH}"

services:
  jupyter-server:
    build: .
    user: docker
    restart: unless-stopped
    ipc: host
    env_file:
      - config.env
    ports:
      - "8888:8888"
    command: [
      "jupyter", "lab",
      "--ip=0.0.0.0",
      "--NotebookApp.token=''",
      "--NotebookApp.password=''",
      "--NotebookApp.allow_origin='https://colab.research.google.com'"
    ]
    volumes:
      - "notebooks:/home/docker/notebooks"
    working_dir: /home/docker/notebooks
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu, utility, compute]
      
 